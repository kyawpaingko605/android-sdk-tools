name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build bison flex golang-go protobuf-compiler
        pip install requests

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b

    - name: Run Build Script
      run: |
        python get_source.py --tags android-14.0.0_r50
        PROTOC_BIN=$(which protoc)
        
        # မူရင်း build.py အတိုင်း အတိအကျ Run ပါသည်
        python build.py \
          --ndk=$ANDROID_NDK_ROOT \
          --abi=arm64-v8a \
          --build=build \
          --protoc=$PROTOC_BIN \
          --target=aapt2

    - name: Upload AAPT2 Zip Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aapt2-android14-package
        # build.py မှ ထုတ်ပေးလိုက်သော zip ဖိုင်ကြီးကို တိုက်ရိုက် သိမ်းဆည်းခိုင်းလိုက်ပါသည်
        path: |
          android-sdk-tools-aarch64.zip
          build/android-sdk-tools-aarch64.zip
