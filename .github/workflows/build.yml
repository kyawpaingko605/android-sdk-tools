name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch Official Google AAPT2 Binary
      run: |
        mkdir -p out_assets
        cd out_assets
        
        # Google ရဲ့ တရားဝင် Android Build Tools အသေချာဆုံး ကွန်ရက်လမ်းကြောင်း
        curl --location --fail -O https://dl.google.com/android/repository/build-tools_r34.0.0-linux.zip
        
        # zip ထဲမှ aapt2 executable အစစ်ကိုသာ သီးသန့်ဆွဲထုတ်ခြင်း
        unzip build-tools_r34.0.0-linux.zip android-14/aapt2
        mv android-14/aapt2 .
        chmod +x aapt2
        
        # မလိုအပ်သော ယာယီဖိုင်များနှင့် folder များကို အကုန်ရှင်းလင်းခြင်း
        rm -rf build-tools_r34.0.0-linux.zip android-14
        
        # သန့်ရှင်းစွာ ဇစ်ပြန်ပတ်ခြင်း
        zip -r ../aapt2-android14-aarch64.zip aapt2
        echo "AAPT2 from Official Google SDK captured successfully!"

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-14-v${{ github.run_number }}
        name: Android 14 AAPT2 Build #${{ github.run_number }}
        body: |
          Official Stable AAPT2 Prebuilt Binary for Android 14.
          Source: Google Android SDK Repository (Build Tools 34.0.0)
        draft: false
        prerelease: false
        files: |
          aapt2-android14-aarch64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
