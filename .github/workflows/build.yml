name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build bison flex golang-go protobuf-compiler
        pip install requests

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b

    - name: Run Build Script
      run: |
        python get_source.py --tags android-14.0.0_r50
        PROTOC_BIN=$(which protoc)
        
        python build.py \
          --ndk=$ANDROID_NDK_ROOT \
          --abi=arm64-v8a \
          --build=build \
          --protoc=$PROTOC_BIN \
          --target=aapt2

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-14-v${{ github.run_number }}
        name: Android 14 AAPT2 Build #${{ github.run_number }}
        body: |
          Automated build of AAPT2 for Android 14 (aarch64).
          Source Tag: android-14.0.0_r50
        draft: false
        prerelease: false
        # မူရင်းထွက်လာသမျှ .zip ဖိုင်မှန်သမျှကို လမ်းကြောင်းမရွေးဘဲ အကုန်ဆွဲတင်ခိုင်းလိုက်ပါသည်
        files: |
          *.zip
          build/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
