name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build bison flex golang-go
        pip install requests

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b

    - name: Run Build Script
      run: |
        # ၁။ Android 14 Source Code များကို ဆွဲယူခြင်း
        python get_source.py --tags android-14.0.0_r50
        
        # ၂။ aapt2 ကို build ရန် လိုအပ်သော Host protoc compiler ကို အရင်ဆောက်ခြင်း
        cd src/protobuf && mkdir build && cd build
        cmake -GNinja -Dprotobuf_BUILD_TESTS=OFF ..
        ninja protoc
        cd ../../..
        
        # ၃။ NDK ကိုအသုံးပြုပြီး aapt2 အား Android Architecture (arm64-v8a) အတွက် တည်ဆောက်ခြင်း
        python build.py \
          --ndk=$ANDROID_NDK_ROOT \
          --abi=arm64-v8a \
          --build=build/aarch64 \
          --protoc=$(pwd)/src/protobuf/build/protoc \
          --target=aapt2

    - name: Upload AAPT2 Executable
      uses: actions/upload-artifact@v4
      with:
        name: aapt2-android14
        path: |
          build/aarch64/build-tools/aapt2
          pack/
