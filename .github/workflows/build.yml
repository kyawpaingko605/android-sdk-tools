name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Official Google Android 14 AAPT2
      run: |
        mkdir -p out_assets
        cd out_assets
        
        # Google ရဲ့ တရားဝင် အလုပ်လုပ်ဆုံး သေချာသော Link အား စနစ်တကျ ပြန်လည်ဒေါင်းလုဒ်ဆွဲခြင်း
        curl --location --fail -O https://repo.maven.apache.org/maven2/com/android/tools/build/aapt2/8.2.2-10154469/aapt2-8.2.2-10154469-linux.jar
        
        # ဒေါင်းလုဒ်ရရှိသော jar ဖိုင်အား ဖြည်ချခြင်း
        unzip aapt2-8.2.2-10154469-linux.jar aapt2
        chmod +x aapt2
        
        # မလိုအပ်သော ယာယီဖိုင်အား ဖျက်သိမ်းခြင်း
        rm -f aapt2-8.2.2-10154469-linux.jar
        
        # သန့်ရှင်းစွာ ဇစ်ပြန်ပတ်ခြင်း
        zip -r ../aapt2-android14-aarch64.zip aapt2
        echo "Official Android 14 AAPT2 captured perfectly!"

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-14-v${{ github.run_number }}
        name: Android 14 AAPT2 Build #${{ github.run_number }}
        body: |
          Official Prebuilt AAPT2 stable binary for Android 14.
          Source: Google Maven Stable Repository
        draft: false
        prerelease: false
        files: |
          aapt2-android14-aarch64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
