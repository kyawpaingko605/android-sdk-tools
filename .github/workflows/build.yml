name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Google ရဲ့ တရားဝင် Android SDK နှင့် Build Tools 34.0.0 အား စိတ်ချရစွာ သတ်မှတ်ခြင်း
    - name: Set up Android SDK Tools
      uses: android-actions/setup-android@v3

    - name: Extract Official Google AAPT2
      run: |
        mkdir -p out_assets
        
        # SDK Manager မှတစ်ဆင့် Android Build-Tools ဗားရှင်း 34.0.0 အား အမှားမရှိ ဒေါင်းလုဒ်ဆွဲခြင်း
        sdkmanager "build-tools;34.0.0"
        
        # ဒေါင်းလုဒ်ရရှိလာသော ပတ်လမ်းကြောင်းထဲမှ aapt2 အစစ်ကို ကူးယူခြင်း
        cp $ANDROID_HOME/build-tools/34.0.0/aapt2 out_assets/
        chmod +x out_assets/aapt2
        
        # သန့်ရှင်းစွာ ဇစ်ပတ်ခြင်း
        cd out_assets
        zip -r ../aapt2-android14-aarch64.zip aapt2
        echo "Official AAPT2 from Android SDK captured successfully!"

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-14-v${{ github.run_number }}
        name: Android 14 AAPT2 Build #${{ github.run_number }}
        body: |
          Official Stable AAPT2 Prebuilt Binary for Android 14.
          Source: Official Android SDK Build-Tools (34.0.0)
        draft: false
        prerelease: false
        files: |
          aapt2-android14-aarch64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
