name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Official Google Android 14 AAPT2
      run: |
        mkdir -p out_assets
        cd out_assets
        
        # Google ရဲ့ တရားဝင် Maven Repository ဆီမှ Android 14 အစစ် (AAPT2 Version 14.0.0) ကို တိုက်ရိုက်ဆွဲချခြင်း
        curl -LO https://repo1.maven.org/maven2/com/android/tools/build/aapt2/14.0.0-11244601/aapt2-14.0.0-11244601-linux.jar
        
        # jar (zip) ဖိုင်ကို ဖြည်ပြီး aapt2 binary အစစ်ကို ဆွဲထုတ်ခြင်း
        unzip aapt2-14.0.0-11244601-linux.jar aapt2
        chmod +x aapt2
        
        # မလိုအပ်သော jar ဖိုင်ကို ပြန်ဖျက်ခြင်း
        rm -f aapt2-14.0.0-11244601-linux.jar
        
        # သန့်ရှင်းစွာ ဇစ်ပြန်ပတ်ခြင်း
        zip -r ../aapt2-android14-aarch64.zip aapt2
        echo "Official Android 14 AAPT2 successfully captured and packaged!"

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-14-v${{ github.run_number }}
        name: Android 14 AAPT2 Build #${{ github.run_number }}
        body: |
          Official Prebuilt AAPT2 stable binary for Android 14.
          Source: Google Maven Repository (14.0.0-11244601)
        draft: false
        prerelease: false
        files: |
          aapt2-android14-aarch64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
