name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # GitHub Releases ထဲသို့ ဖိုင်လှမ်းတင်ရန် လုပ်ပိုင်ခွင့်ပေးခြင်း

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build bison flex golang-go protobuf-compiler
        pip install requests

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b

    - name: Run Build Script
      run: |
        # မူရင်း get_source.py အတိုင်း Run ပြီး repos.json မှ အချက်အလက်များကို ဆွဲချပါသည်
        python get_source.py --tags android-14.0.0_r50
        PROTOC_BIN=$(which protoc)
        
        python build.py \
          --ndk=$ANDROID_NDK_ROOT \
          --abi=arm64-v8a \
          --build=build \
          --protoc=$PROTOC_BIN \
          --target=aapt2

    - name: Prepare Zip File
      run: |
        # ထွက်လာသော zip ဖိုင်ကို ရှင်းလင်းသော အမည်တစ်ခုဖြင့် သတ်မှတ်ပေးခြင်း
        cp android-sdk-tools-aarch64.zip aapt2-android14-aarch64.zip || true
        cp build/android-sdk-tools-aarch64.zip aapt2-android14-aarch64.zip || true

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-14-v${{ github.run_number }}
        name: Android 14 AAPT2 Build #${{ github.run_number }}
        body: |
          Automated build of AAPT2 for Android 14 (aarch64).
          Source Tag: android-14.0.0_r50
        draft: false
        prerelease: false
        files: |
          aapt2-android14-aarch64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
