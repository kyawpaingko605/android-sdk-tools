name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build bison flex golang-go
        pip install requests

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b

    - name: Run Build Script
      run: |
        python get_source.py --tags android-14.0.0_r50
        # aapt2 ဖိုင် အမှန်တကယ်ထွက်လာစေရန် ဤနေရာတွင် မပျက်မကွက် Build ခိုင်းရပါမည်
        python build.py --ndk=$ANDROID_NDK_ROOT --abi=arm64-v8a

    - name: Upload AAPT2 Executable
      uses: actions/upload-artifact@v4
      with:
        name: aapt2-android14
        path: |
          build/build-tools/aapt2
          pack/
