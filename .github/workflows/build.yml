name: Build Android SDK Tools

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        # get_source.py အတွက် လိုအပ်သော bison, flex, go တို့ကိုပါ တစ်ခါတည်း မြှင့်တင်ပေးထားပါသည်
        sudo apt-get install -y cmake ninja-build bison flex golang-go
        # requests module ကို သွင်းပေးရန် ထည့်လိုက်ပါသည်
        pip install requests

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b

    - name: Run Build Script
      run: |
        # နောက်ဆုံးထွက် Android 14 Source Code များကို ဆွဲရန် tag မြှင့်ထားပါသည်
        python get_source.py --tags android-14.0.0_r50
